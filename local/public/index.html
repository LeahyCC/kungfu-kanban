<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kungfu Kanban</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#141210" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kungfu Kanban" />
  <link rel="apple-touch-icon" href="/icons/apple-icon-180x180.png" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🥋</span>
      <h1>Kungfu Kanban</h1>
      <span class="sub">on your subscription · via Claude Code CLI</span>
      <nav class="tabs">
        <button id="tabBoard" class="tab active">Board</button>
        <button id="tabManager" class="tab">Manager <span id="suggCount" class="pill hidden"></span></button>
      </nav>
    </div>
    <div class="header-actions">
      <label class="conc">
        parallel <input id="maxConcurrent" type="number" min="1" max="8" />
      </label>
      <button id="newTaskBtn" class="primary">+ New task</button>
    </div>
  </header>

  <main id="board"></main>

  <main id="managerView" class="manager hidden">
    <section class="mgr-col mgr-settings">
      <h2>Manager settings</h2>
      <form id="mgrForm">
        <label class="check"><input type="checkbox" name="enabled" /> Manager enabled</label>
        <div class="row">
          <label>Model <select name="model"></select></label>
          <label>Effort <select name="effort"></select></label>
        </div>
        <label>Autonomy
          <select name="autonomy">
            <option value="suggest">suggest — every action needs my approval</option>
            <option value="semi">semi — can create/route/run; review needs approval</option>
            <option value="auto">auto — full autopilot within guardrails</option>
          </select>
        </label>
        <label>Management style (freeform instructions)
          <textarea name="stylePrompt" rows="4" placeholder="e.g. prefer haiku for docs tasks; never auto-approve DB migrations; keep cards under one hour of work"></textarea>
        </label>
        <fieldset>
          <legend>Triggers</legend>
          <label class="check"><input type="checkbox" name="onFinish" /> when a task finishes (review it)</label>
          <label class="check"><input type="checkbox" name="onNewCard" /> when a card is added (triage it)</label>
          <label class="check inline">every <input type="number" name="intervalMin" min="0" max="240" style="width:60px" /> min (0 = off)</label>
        </fieldset>
        <div class="row">
          <label>Max launches/hour <input type="number" name="maxLaunchesPerHour" min="1" max="60" /></label>
          <label>Max retries/task <input type="number" name="maxRetries" min="0" max="5" /></label>
        </div>
        <label>Permission ceiling
          <select name="permissionCeiling"></select>
        </label>
        <button type="submit" class="primary">Save settings</button>
      </form>
    </section>

    <section class="mgr-col mgr-main">
      <h2>Chat <span id="mgrBusy" class="pill hidden">thinking…</span></h2>
      <div id="mgrChat" class="mgr-chat"></div>
      <form id="mgrChatForm" class="mgr-chat-input">
        <input name="message" placeholder="e.g. plan the auth refactor into cards, or: what's blocking?" autocomplete="off" />
        <button type="submit" class="primary">Send</button>
      </form>
      <h2>Pending suggestions</h2>
      <div id="mgrSuggestions" class="mgr-suggestions"></div>
    </section>

    <section class="mgr-col mgr-log-col">
      <h2>Activity log</h2>
      <div id="mgrLog" class="mgr-log"></div>
    </section>
  </main>

  <!-- Card editor modal -->
  <div id="modalBackdrop" class="backdrop hidden">
    <div class="modal">
      <h2 id="modalTitle">New task</h2>
      <form id="taskForm">
        <label>Title
          <input name="title" required placeholder="Fix flaky login test" />
        </label>
        <label>Prompt
          <textarea name="prompt" rows="5" required placeholder="What should the agent do?"></textarea>
        </label>
        <label>Working directory
          <input name="cwd" placeholder="/Users/you/project" />
        </label>
        <div class="row">
          <label>Model
            <select name="model"></select>
          </label>
          <label>Effort
            <select name="effort"></select>
          </label>
          <label>Permissions
            <select name="permissionMode"></select>
          </label>
        </div>
        <div class="row">
          <label>Agent
            <select name="agent"><option value="">(none)</option></select>
          </label>
          <label>Priority
            <select name="priority">
              <option value="0">0 · low</option>
              <option value="1">1 · normal</option>
              <option value="2">2 · high</option>
              <option value="3">3 · urgent</option>
            </select>
          </label>
          <label class="check">
            <input type="checkbox" name="worktree" /> Git worktree
          </label>
        </div>
        <label>Acceptance criteria (the manager reviews against this)
          <textarea name="acceptanceCriteria" rows="2" placeholder="e.g. tests pass; README updated; no new dependencies"></textarea>
        </label>
        <label>Skills to use</label>
        <div id="skillPicker" class="skill-picker"></div>
        <div class="modal-actions">
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail drawer -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-head">
      <h2 id="drawerTitle"></h2>
      <button id="drawerClose">✕</button>
    </div>
    <div id="drawerMeta" class="drawer-meta"></div>
    <div id="drawerActions" class="drawer-actions"></div>
    <div id="transcript" class="transcript"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
